<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Sign In | Intermountain Health</title>
  <link rel="icon" type="image/jpeg" href="../assets/logos/intermouintainHealthLogo_purple.jpeg">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/navbar.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/forms.css">
  <link rel="stylesheet" href="../css/responsive.css">
  <style>
    .login-page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 56px - 80px);
      padding: 2rem 1rem;
    }
    .login-card {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 420px;
      padding: 2.5rem 2rem;
    }
    .login-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 1.75rem;
    }
    .login-logo img {
      height: 48px;
      width: auto;
      object-fit: contain;
      margin-bottom: 0.75rem;
    }
    .login-logo h1 {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--c-text);
      text-align: center;
    }
    .login-logo p {
      font-size: 0.85rem;
      color: var(--c-text-secondary);
      text-align: center;
      margin-top: 0.25rem;
    }
    .login-form .form-group {
      margin-bottom: 1rem;
    }
    .login-form .form-group label {
      font-weight: 600;
      font-size: 0.85rem;
      margin-bottom: 0.3rem;
      display: block;
    }
    .login-form .form-group input,
    .login-form .form-group select {
      width: 100%;
      padding: 0.6rem 0.75rem;
      border: 1px solid var(--c-border);
      border-radius: 6px;
      font-size: 0.9rem;
      font-family: inherit;
      color: var(--c-text);
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .login-form .form-group input:focus,
    .login-form .form-group select:focus {
      outline: none;
      border-color: var(--c-primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
    }
    .login-actions {
      margin-top: 1.5rem;
    }
    .login-actions .btn {
      width: 100%;
      justify-content: center;
      padding: 0.7rem;
      font-size: 1rem;
    }
    .login-demo-notice {
      margin-top: 1.25rem;
      text-align: center;
      font-size: 0.75rem;
      color: var(--c-text-secondary);
      background: var(--c-purple-light);
      border: 1px solid #c4b5fd;
      border-radius: var(--radius);
      padding: 0.5rem 0.75rem;
    }
    .login-demo-notice strong {
      color: var(--c-purple);
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <a href="../index.html" class="nav-brand">
      <img src="../assets/logos/intermouintainHealthLogo_purple.jpeg" alt="Intermountain Health" class="nav-logo">
      <span>Community Health Platform</span>
    </a>
    <div class="nav-links">
      <a href="../index.html" class="nav-link">
        <svg viewBox="0 0 20 20" width="16" height="16" aria-hidden="true"><path d="M4 4h12v2H4zm0 4h12v2H4zm0 4h8v2H4z" fill="currentColor"/></svg>
        Intake Form
      </a>
      <a href="user-login.html" class="nav-link active" aria-current="page">
        <svg viewBox="0 0 20 20" width="16" height="16" aria-hidden="true"><path d="M10 2a5 5 0 0 1 5 5v1a5 5 0 0 1-10 0V7a5 5 0 0 1 5-5zm-7 16a7 7 0 0 1 14 0" fill="none" stroke="currentColor" stroke-width="1.8"/></svg>
        User Portal
      </a>
      <a href="login.html" class="nav-link">
        <svg viewBox="0 0 20 20" width="16" height="16" aria-hidden="true"><path d="M3 3h6v8H3zm8 0h6v5h-6zm0 7h6v7h-6zM3 13h6v4H3z" fill="currentColor"/></svg>
        Admin Dashboard
      </a>
    </div>
  </nav>

  <!-- Login -->
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <img src="../assets/logos/intermouintainHealthLogo_purple.jpeg" alt="Intermountain Health">
        <h1>User Portal Sign In</h1>
        <p>Check the status of your event requests</p>
      </div>
      <form class="login-form" id="login-form" novalidate>
        <div class="form-group">
          <label for="login-user">Select Your Account</label>
          <select id="login-user"></select>
        </div>
        <div class="form-group">
          <label for="login-pass">Password</label>
          <input type="password" id="login-pass" value="demo1234" autocomplete="current-password">
        </div>
        <div class="login-actions">
          <button type="submit" class="btn btn-primary">
            <svg viewBox="0 0 20 20" width="16" height="16" aria-hidden="true"><path d="M10 2a5 5 0 0 1 5 5v1a5 5 0 0 1-10 0V7a5 5 0 0 1 5-5zm-7 16a7 7 0 0 1 14 0" fill="none" stroke="currentColor" stroke-width="1.8"/></svg>
            Sign In
          </button>
        </div>
      </form>
      <div class="login-demo-notice">
        <strong>Demo Mode</strong> — Select a requestor and click Sign In to view their portal.
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="site-footer">
    <p>Built with Generative AI by <strong>Lance Petrisko</strong>, <strong>Samuel Rawls</strong>, and <strong>Cohen Phillips</strong></p>
  </footer>

  <script src="../js/store.js"></script>
  <script src="../js/helpers.js"></script>
  <script src="../js/ai.js"></script>
  <script src="../js/data/demo-requests.js"></script>
  <script>
    // Seed data if needed
    Store.load();
    if (Store.requests.length === 0) {
      DEMO_REQUESTS.forEach(data => {
        const req = processNewRequest({ ...data });
        req.status = data.status;
        Store.requests.push(req);
      });
      Store.save();
    }

    // Build unique requestor list from actual stored requests
    const sel = document.getElementById('login-user');
    const seen = new Set();
    Store.requests.forEach(r => {
      const key = r.requestorName;
      if (seen.has(key)) return;
      seen.add(key);
      const o = document.createElement('option');
      o.value = key;
      o.textContent = key + ' — ' + r.organization;
      sel.appendChild(o);
    });

    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const name = document.getElementById('login-user').value;
      localStorage.setItem('chp_user_name', name);
      window.location.href = 'user-dashboard.html';
    });
  </script>
</body>
</html>
